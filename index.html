<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI가 추천하는 나만의 데이트 코스">
  <title>DateRoute — AI 데이트 코스 추천</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=6e5030c4071f0c66fad8db74b01cb924&libraries=services"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="header-inner">
        <div class="header-logo">
          <span class="logo-icon">💑</span>
          <span class="logo-text">DateRoute</span>
        </div>
        <div id="header-step-indicator" class="step-indicator" aria-hidden="true">
          <span class="step-dot active" data-step="1"></span>
          <span class="step-dot" data-step="2"></span>
          <span class="step-dot" data-step="3"></span>
        </div>
      </div>
    </header>
    <main id="onboarding">
      <section id="step-1" class="step" role="main" aria-label="지역 선택">
        <div class="step-card">
          <div class="step-header">
            <p class="step-label">STEP 1 / 3</p>
            <h1 class="step-title">어디서 데이트할까요?</h1>
            <p class="step-desc">데이트 지역을 선택해주세요</p>
          </div>
          <div class="city-row">
            <span class="city-fixed-label">서울</span>
          </div>
          <div class="chip-group" id="district-chips" role="group" aria-label="상권 선택">
            <button class="region-chip" data-value="강남" type="button">강남</button>
            <button class="region-chip" data-value="홍대·합정" type="button">홍대·합정</button>
            <button class="region-chip" data-value="이태원·한남" type="button">이태원·한남</button>
            <button class="region-chip" data-value="성수" type="button">성수</button>
            <button class="region-chip" data-value="인사동·북촌" type="button">인사동·북촌</button>
            <button class="region-chip" data-value="여의도·마포" type="button">여의도·마포</button>
            <button class="region-chip" data-value="건대·군자" type="button">건대·군자</button>
            <button class="region-chip" data-value="신촌·연세로" type="button">신촌·연세로</button>
          </div>
          <button class="btn-primary" id="step1-next" type="button" disabled>다음으로</button>
        </div>
      </section>
      <section id="step-2" class="step hidden" role="main" aria-label="테마 선택">
        <div class="step-card">
          <div class="step-header">
            <p class="step-label">STEP 2 / 3</p>
            <h1 class="step-title">어떤 데이트 할까요?</h1>
            <p class="step-desc">테마를 최대 2개까지 선택해주세요</p>
          </div>
          <div class="theme-grid" id="theme-cards" role="group" aria-label="테마 선택">
            <button class="theme-card" data-value="로맨틱" type="button"><span class="theme-icon" aria-hidden="true">💕</span><span class="theme-name">로맨틱</span></button>
            <button class="theme-card" data-value="액티브·아웃도어" type="button"><span class="theme-icon" aria-hidden="true">🏃</span><span class="theme-name">액티브·아웃도어</span></button>
            <button class="theme-card" data-value="맛집 탐방" type="button"><span class="theme-icon" aria-hidden="true">🍜</span><span class="theme-name">맛집 탐방</span></button>
            <button class="theme-card" data-value="문화·예술" type="button"><span class="theme-icon" aria-hidden="true">🎨</span><span class="theme-name">문화·예술</span></button>
            <button class="theme-card" data-value="쇼핑" type="button"><span class="theme-icon" aria-hidden="true">🛍️</span><span class="theme-name">쇼핑</span></button>
            <button class="theme-card" data-value="힐링" type="button"><span class="theme-icon" aria-hidden="true">🌿</span><span class="theme-name">힐링</span></button>
          </div>
          <button class="btn-primary" id="step2-next" type="button" disabled>다음으로</button>
          <button class="btn-back" id="step2-back" type="button">이전으로</button>
        </div>
      </section>
      <section id="step-3" class="step hidden" role="main" aria-label="필터 선택">
        <div class="step-card">
          <div class="step-header">
            <p class="step-label">STEP 3 / 3</p>
            <h1 class="step-title">세부 조건을 설정해요</h1>
            <p class="step-desc">원하는 조건을 선택해주세요</p>
          </div>
          <div class="filter-section">
            <p class="filter-label">시간대</p>
            <div class="chip-group" id="timeslot-chips" role="group" aria-label="시간대 선택">
              <button class="filter-chip" data-group="timeSlot" data-value="day" type="button">☀️ 낮</button>
              <button class="filter-chip active" data-group="timeSlot" data-value="evening" type="button">🌆 저녁</button>
              <button class="filter-chip" data-group="timeSlot" data-value="allday" type="button">🌅 하루 종일</button>
            </div>
          </div>
          <div class="filter-section">
            <p class="filter-label">이동수단</p>
            <div class="chip-group" id="transport-chips" role="group" aria-label="이동수단 선택">
              <button class="filter-chip" data-group="transport" data-value="walk" type="button">🚶 도보</button>
              <button class="filter-chip active" data-group="transport" data-value="transit" type="button">🚇 대중교통</button>
              <button class="filter-chip" data-group="transport" data-value="car" type="button">🚗 자동차</button>
            </div>
          </div>
          <button class="btn-primary" id="step3-submit" type="button">AI 코스 만들기 ✨</button>
          <button class="btn-back" id="step3-back" type="button">이전으로</button>
        </div>
      </section>
    </main>
    <section id="loading" class="hidden" role="status" aria-live="polite" aria-label="코스 생성 중">
      <div class="loading-inner">
        <div class="loading-spinner" aria-hidden="true"><div class="spinner-ring"></div></div>
        <h2 class="loading-title">AI가 코스를 만들고 있어요</h2>
        <ul class="loading-steps" id="loading-steps" aria-label="진행 상황">
          <li class="loading-step" id="loading-step-1" aria-hidden="true">📍 카카오맵에서 실제 장소 검색 중...</li>
          <li class="loading-step" id="loading-step-2" aria-hidden="true">🤖 AI가 최적 장소를 선별 중...</li>
          <li class="loading-step" id="loading-step-3" aria-hidden="true">🗺️ 데이트 코스 동선 최적화 중...</li>
        </ul>
      </div>
    </section>
    <section id="result" class="hidden" role="main" aria-label="추천 코스 결과">
      <div id="result-header">
        <button class="btn-back-result" id="result-back" type="button" aria-label="처음으로 돌아가기">← 처음으로</button>
        <h1 id="result-title" class="result-title"></h1>
        <p id="result-summary-text" class="result-summary-text"></p>
        <p id="result-data-source" class="result-data-source"></p>
      </div>
      <div id="result-summary" class="summary-bar" role="region" aria-label="코스 요약">
        <div class="summary-item"><span class="summary-value" id="summary-duration">—</span><span class="summary-key">총 소요 시간</span></div>
        <div class="summary-divider" aria-hidden="true"></div>
        <div class="summary-item"><span class="summary-value" id="summary-budget">—</span><span class="summary-key">1인 예상 비용</span></div>
        <div class="summary-divider" aria-hidden="true"></div>
        <div class="summary-item"><span class="summary-value" id="summary-places">—</span><span class="summary-key">장소 수</span></div>
      </div>
      <div id="view-tabs" role="tablist" aria-label="보기 전환">
        <button class="tab-btn active" id="tab-timeline" role="tab" aria-selected="true" aria-controls="timeline-view" type="button">타임라인</button>
        <button class="tab-btn" id="tab-map" role="tab" aria-selected="false" aria-controls="map-view" type="button">지도</button>
      </div>
      <div id="timeline-view" role="tabpanel" aria-labelledby="tab-timeline"></div>
      <div id="map-view" class="hidden" role="tabpanel" aria-labelledby="tab-map">
        <div id="kakao-map" aria-label="카카오맵"></div>
      </div>
      <div id="result-actions">
        <button class="btn-secondary" id="action-retry" type="button">🔄 다시 추천받기</button>
        <button class="btn-secondary" id="action-save" type="button">💾 저장</button>
        <button class="btn-secondary" id="action-share" type="button">🔗 공유</button>
        <button class="btn-secondary" id="action-capture" type="button">📷 이미지 저장</button>
      </div>
    </section>
  </div>
  <div id="toast-container" aria-live="assertive" aria-atomic="true"></div>
  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-card" id="modal-card">
      <button class="modal-close" id="modal-close" type="button" aria-label="모달 닫기">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>
  <script src="js/config.js"></script>
  <script src="js/kakao-local.js"></script>
  <script src="js/api.js"></script>
  <script src="js/map.js"></script>
  <script src="js/app.js" defer></script>
</body>
</html>
